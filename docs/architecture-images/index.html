<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>安全事件模型与安全事件架构图</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f8;
      color: #17202a;
    }
    header {
      position: sticky;
      top: 0;
      background: #ffffff;
      border-bottom: 1px solid #dfe4ea;
      padding: 14px 16px;
      z-index: 1;
    }
    h1 {
      margin: 0;
      font-size: 18px;
    }
    main {
      padding: 12px;
    }
    section {
      background: #ffffff;
      border: 1px solid #dfe4ea;
      border-radius: 8px;
      margin-bottom: 14px;
      padding: 10px;
      overflow: auto;
    }
    h2 {
      font-size: 16px;
      margin: 4px 0 10px;
    }
    img {
      display: block;
      min-width: 900px;

<body>
  <header>
    <h1>安全事件模型与安全事件架构图</h1>
  </header>
  <main>
    <section>
      <h2>1. 总体架构图</h2>
      <img src="01-architecture.svg" alt="总体架构图">
    </section>
    <section>
      <h2>2. 自动聚合生成安全事件流程</h2>
      <img src="02-architecture.svg" alt="自动聚合生成安全事件流程">
    </section>
    <section>
      <h2>3. 人工创建安全事件流程</h2>
      <img src="03-architecture.svg" alt="人工创建安全事件流程">

    <section>

</html>
